<style>
:root {
  --bg: #1a1a2e; --bg2: #16213e; --card: #1e2a4a;
  --border: #2a3a5a; --text: #e0e0e0; --text2: #a0a0a0;
  --accent: #e94560; --success: #4caf50; --warning: #ff9800;
  --info: #2196f3;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; padding: 16px; padding-bottom: 80px;
  line-height: 1.5;
}
h1 { font-size: 1.5rem; margin-bottom: 8px; color: var(--accent); }
h2 { font-size: 1.2rem; margin: 16px 0 8px; color: var(--accent); }
h3 { font-size: 1rem; margin: 12px 0 6px; color: var(--text); }
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px; margin-bottom: 12px;
}
.btn {
  display: inline-block; padding: 12px 24px; border: none; border-radius: 8px;
  font-size: 1rem; cursor: pointer; font-weight: 600; color: #fff;
  background: var(--accent); transition: opacity 0.2s; text-decoration: none;
}
.btn:hover { opacity: 0.85; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-success { background: var(--success); }
.btn-secondary { background: var(--bg2); border: 1px solid var(--border); }
.btn-info { background: var(--info); }
.btn-sm { padding: 8px 16px; font-size: 0.9rem; }
.btn-block { width: 100%; display: block; text-align: center; }
input[type="text"], input[type="number"], select {
  background: var(--bg2); color: var(--text); border: 1px solid var(--border);
  padding: 12px 16px; border-radius: 8px; font-size: 1rem; width: 100%;
}
input:focus, select:focus { outline: none; border-color: var(--accent); }
.progress-bar {
  background: var(--border); border-radius: 10px; height: 12px; overflow: hidden; margin: 8px 0;
}
.progress-fill { height: 100%; transition: width 0.3s; }
.topic-list { list-style: none; }
.topic-item {
  background: var(--bg2); border-radius: 8px; padding: 12px;
  margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
  cursor: pointer; transition: background 0.2s;
}
.topic-item:hover { background: var(--card); }
.topic-item.mastered { border-left: 4px solid var(--success); }
.topic-header {
  background: var(--card); border-radius: 8px; padding: 12px;
  margin-bottom: 4px; cursor: pointer; transition: background 0.2s;
  border: 1px solid var(--border);
}
.topic-header:hover { background: var(--bg2); }
.topic-header.expanded { border-bottom-left-radius: 0; border-bottom-right-radius: 0; margin-bottom: 0; }
.subtopic-list {
  background: var(--bg2); border: 1px solid var(--border); border-top: none;
  border-radius: 0 0 8px 8px; margin-bottom: 8px; overflow: hidden;
}
.subtopic-item {
  padding: 10px 12px 10px 32px; display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.2s;
}
.subtopic-item:last-child { border-bottom: none; }
.subtopic-item:hover { background: var(--card); }
.subtopic-item.mastered { border-left: 4px solid var(--success); padding-left: 28px; }
.expand-icon { transition: transform 0.2s; display: inline-block; margin-right: 8px; }
.expand-icon.expanded { transform: rotate(90deg); }
.hidden { display: none !important; }
.hint-box { background: var(--bg2); padding: 12px; border-radius: 8px; margin: 8px 0; display: none; }
.hint-box.show { display: block; }
.correct { color: var(--success); font-weight: bold; }
.incorrect { color: var(--accent); font-weight: bold; }
.nav-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg2); border-top: 1px solid var(--border);
  display: flex; justify-content: space-around; padding: 8px 0;
  z-index: 100;
}
.nav-btn {
  background: none; border: none; color: var(--text2); font-size: 0.75rem;
  padding: 4px 12px; cursor: pointer; display: flex; flex-direction: column; align-items: center;
}
.nav-btn.active { color: var(--accent); }
.nav-btn span { font-size: 1.4rem; margin-bottom: 2px; }
.badge {
  background: var(--accent); color: #fff; padding: 2px 8px; border-radius: 10px;
  font-size: 0.75rem; margin-left: 8px;
}
.badge-sm {
  background: var(--border); color: var(--text2); padding: 2px 6px; border-radius: 8px;
  font-size: 0.7rem; margin-left: 6px;
}
.celebration {
  background: linear-gradient(135deg, var(--success), var(--accent));
  text-align: center; padding: 24px; border-radius: 12px; margin-bottom: 16px;
}
.celebration h2 { color: #fff; margin: 0; }
.diff-pills { display: flex; gap: 8px; margin: 12px 0; flex-wrap: wrap; }
.diff-pill {
  padding: 8px 16px; border-radius: 20px; background: var(--card);
  border: 1px solid var(--border); color: var(--text2); cursor: pointer;
  transition: all 0.2s;
}
.diff-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.explanation-box {
  background: var(--bg2); border-left: 4px solid var(--info);
  padding: 12px 16px; border-radius: 0 8px 8px 0; margin: 12px 0;
}
.steps-list { padding-left: 20px; margin-top: 8px; }
.steps-list li { margin: 6px 0; }
.checkbox-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; }
.checkbox-item {
  display: flex; align-items: center; gap: 8px; padding: 8px;
  background: var(--bg2); border-radius: 8px; cursor: pointer;
}
.checkbox-item:hover { background: var(--card); }
.checkbox-item input { width: 18px; height: 18px; accent-color: var(--accent); }
.checkbox-item.subtopic { padding-left: 24px; font-size: 0.9rem; }
.stat-card {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px; background: var(--bg2); border-radius: 8px; margin-bottom: 8px;
}
.stat-value { font-size: 1.5rem; font-weight: bold; color: var(--accent); }
.mistake-tag {
  display: inline-block; padding: 4px 10px; border-radius: 12px;
  background: var(--bg2); font-size: 0.85rem; margin: 4px;
}
.flex-row { display: flex; gap: 8px; flex-wrap: wrap; }
.flex-grow { flex: 1; }
.parent-progress { display: flex; gap: 2px; margin-top: 4px; }
.parent-progress-dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--border);
}
.parent-progress-dot.mastered { background: var(--success); }
.parent-progress-dot.started { background: var(--warning); }
@media (max-width: 480px) { .checkbox-grid { grid-template-columns: 1fr; } }

function getAllSubtopics() {
  const result = [];
  TOPICS.forEach(t => {
    if (t.children && t.children.length > 0) {
      t.children.forEach(c => result.push({ ...c, parentId: t.id, parentName: t.name, parentIcon: t.icon }));
    } else {
      result.push({ id: t.id, name: t.name, parentId: null, parentName: null, parentIcon: t.icon });
    }
  });
  return result;
}
const ALL_SUBTOPICS = getAllSubtopics();

const MASTERY_REQUIRED = 10;
const MASTERY_ACCURACY = 80;

let state = {
  page: 'topics', currentTopic: null, currentQuestion: null, difficulty: 1,
  showResult: false, lastAnswer: '', wasCorrect: false,
  testQuestions: [], testAnswers: [], testResults: null, testCurrentIndex: 0,
  showExplanation: false, expandedTopics: {}
};

function loadProgress() { try { return JSON.parse(localStorage.getItem('mathtutor_progress')) || {}; } catch { return {}; } }
function saveProgress(p) { localStorage.setItem('mathtutor_progress', JSON.stringify(p)); }
function loadSRS() { try { return JSON.parse(localStorage.getItem('mathtutor_srs')) || {}; } catch { return {}; } }
function saveSRS(s) { localStorage.setItem('mathtutor_srs', JSON.stringify(s)); }
function loadAttempts() { try { return JSON.parse(localStorage.getItem('mathtutor_attempts')) || []; } catch { return []; } }
function saveAttempts(a) { localStorage.setItem('mathtutor_attempts', JSON.stringify(a.slice(-500))); }
function loadMistakes() { try { return JSON.parse(localStorage.getItem('mathtutor_mistakes')) || {}; } catch { return {}; } }
function saveMistakes(m) { localStorage.setItem('mathtutor_mistakes', JSON.stringify(m)); }
function loadExpandedState() { try { return JSON.parse(localStorage.getItem('mathtutor_expanded')) || {}; } catch { return {}; } }
function saveExpandedState(e) { localStorage.setItem('mathtutor_expanded', JSON.stringify(e)); }

function getTopicMastery(topicId) {
  const p = loadProgress();
  const data = p[topicId] || { correct: 0, total: 0 };
  const accuracy = data.total > 0 ? Math.round(100 * data.correct / data.total) : 0;
  const isMastered = data.correct >= MASTERY_REQUIRED && accuracy >= MASTERY_ACCURACY;
  return { ...data, accuracy, isMastered, progress: Math.min(100, Math.round(100 * data.correct / MASTERY_REQUIRED)), needed: Math.max(0, MASTERY_REQUIRED - data.correct) };
}

function getParentMastery(parentId) {
  const topic = TOPICS.find(t => t.id === parentId);
  if (!topic || !topic.children || topic.children.length === 0) return getTopicMastery(parentId);
  let totalCorrect = 0, totalAttempts = 0, masteredCount = 0;
  topic.children.forEach(c => {
    const m = getTopicMastery(c.id);
    totalCorrect += m.correct; totalAttempts += m.total;
    if (m.isMastered) masteredCount++;
  });
  const accuracy = totalAttempts > 0 ? Math.round(100 * totalCorrect / totalAttempts) : 0;
  return { correct: totalCorrect, total: totalAttempts, accuracy, isMastered: masteredCount === topic.children.length, masteredCount, childCount: topic.children.length, progress: Math.round(100 * masteredCount / topic.children.length) };
}

function recordAttempt(topicId, correct, mistakeType = null, userAnswer = '') {
  const p = loadProgress();
  if (!p[topicId]) p[topicId] = { correct: 0, total: 0 };
  p[topicId].total++;
  if (correct) p[topicId].correct++;
  saveProgress(p);
  const attempts = loadAttempts();
  attempts.push({ topicId, correct, timestamp: Date.now(), difficulty: state.difficulty, answer: userAnswer });
  saveAttempts(attempts);
  if (!correct && mistakeType) { const m = loadMistakes(); m[mistakeType] = (m[mistakeType] || 0) + 1; saveMistakes(m); }
}

function updateSRS(cardId, topicId, correct) {
  const srs = loadSRS(); const now = Date.now();
  if (!srs[cardId]) { srs[cardId] = { topicId, interval: correct ? 3 : 1, nextDue: now + (correct ? 3 : 1) * 86400000, correct: correct ? 1 : 0, attempts: 1 }; }

function getGeneratorForTopic(topicId) {
  if (generators[topicId]) return generators[topicId];
  const topic = TOPICS.find(t => t.id === topicId);
  if (topic && topic.children && topic.children.length > 0) {
    return (seed, diff) => {
      const r = rng(seed);
      const child = choice(r, topic.children);
      return generators[child.id] ? generators[child.id](seed, diff) : null;
    };
  }
  return null;
}

function generateQuestion(topicId, difficulty = 1) {
  const seed = Date.now() + Math.floor(Math.random() * 10000);
  const gen = getGeneratorForTopic(topicId);
  if (!gen) return null;
  const q = gen(seed, difficulty);
  if (!q) return null;
  q.topicId = topicId; q.seed = seed; q.difficulty = difficulty;
  return q;
}

function normalizeAnswer(str) {
  return str.toLowerCase().replace(/\s+/g,'').replace(/[×]/g,'*').replace(/[÷]/g,'/').replace(/√/g,'sqrt').replace(/\^/g,'^').replace(/°/g,'').replace(/g$/i,'');
}

function checkAnswer(given, expected) {
  const normGiven = normalizeAnswer(given), normExpected = normalizeAnswer(expected);
  if (normGiven === normExpected) return true;
  if (normExpected.includes('or')) {
    const parts = normExpected.split('or').map(p=>p.replace(/x=/g,'').trim());
    const givenParts = normGiven.replace(/x=/g,'').split(/or|,/).map(p=>p.trim());
    if (parts.length === givenParts.length) { parts.sort(); givenParts.sort(); if (parts.every((p,i)=>p===givenParts[i])) return true; }
  }
  if (normExpected.includes(',') && normExpected.includes('=')) {
    const expPairs = normExpected.split(',').map(p=>p.trim());
    const givPairs = normGiven.split(',').map(p=>p.trim());
    if (expPairs.length === givPairs.length && expPairs.every((ep,i)=>ep===givPairs[i])) return true;
  }
  if (normExpected==='minimum'||normExpected==='maximum') {
    if (normGiven.includes('min') && normExpected==='minimum') return true;
    if (normGiven.includes('max') && normExpected==='maximum') return true;
  }
  try {
    const numGiven = parseFloat(normGiven.replace(/[^0-9.-]/g,''));
    const numExpected = parseFloat(normExpected.replace(/[^0-9.-]/g,''));
    if (!isNaN(numGiven) && !isNaN(numExpected) && Math.abs(numGiven-numExpected) < 0.15) return true;
  } catch {}
  try {
    if (normGiven.includes('/') && normExpected.includes('/')) {
      const [gn,gd] = normGiven.split('/').map(Number);
      const [en,ed] = normExpected.split('/').map(Number);
      if (gn/gd === en/ed) return true;
    }
  } catch {}
  return false;
}

  return `<button class="btn btn-sm btn-secondary" onclick="showPage('topics')" style="margin-bottom:12px;">Back</button><h1>${name}</h1>
    <div class="card"><div style="display:flex;justify-content:space-between;"><span>${m.isMastered ? 'Mastered!' : `${m.correct}/${MASTERY_REQUIRED} (${m.accuracy}%)`}</span>
    ${!m.isMastered ? `<span style="color:var(--text2);">Need ${m.needed} more at 80%+</span>` : ''}</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${m.progress}%;background:${m.isMastered?'var(--success)':m.accuracy>=80?'var(--accent)':'var(--warning)'};"></div></div></div>
    <div class="diff-pills"><span class="diff-pill ${state.difficulty===1?'active':''}" onclick="setDifficulty(1)">Easy</span><span class="diff-pill ${state.difficulty===2?'active':''}" onclick="setDifficulty(2)">Medium</span><span class="diff-pill ${state.difficulty===3?'active':''}" onclick="setDifficulty(3)">Hard</span></div>
    <div class="card"><p style="font-size:1.1rem;margin-bottom:16px;"><strong>${q.prompt}</strong></p>
    <form onsubmit="submitAnswer(event)"><input type="text" id="answer" placeholder="Your answer..." autocomplete="off" style="margin-bottom:12px;"><button type="submit" class="btn btn-block">Submit</button></form>
    <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;"><button class="btn btn-sm btn-secondary" onclick="showHint(0)">Hint 1</button><button class="btn btn-sm btn-secondary" onclick="showHint(1)">Hint 2</button><button class="btn btn-sm btn-secondary" onclick="showHint(2)">Hint 3</button><button class="btn btn-sm btn-info" onclick="toggleExplanation()">Theory</button></div>
    <div id="hint0" class="hint-box">${q.hints[0] || ''}</div><div id="hint1" class="hint-box">${q.hints[1] || ''}</div><div id="hint2" class="hint-box">${q.hints[2] || ''}</div>
    <div id="explanation" class="explanation-box ${state.showExplanation?'':'hidden'}" style="margin-top:12px;">${TOPIC_EXPLANATIONS[state.currentTopic] || ''}</div></div>
    <button class="btn btn-secondary btn-block" onclick="nextQuestion()">Skip Question</button>`;
}

function renderReview() {
  const dueCards = getDueCards();
  if (dueCards.length === 0) return `<h1>Review</h1><div class="card" style="text-align:center;padding:40px;"><p style="font-size:2rem;">&#10003;</p><p style="font-size:1.2rem;">All caught up!</p><p style="color:var(--text2);">No cards due for review.</p><button class="btn" style="margin-top:16px;" onclick="showPage('topics')">Practice Topics</button></div>`;
  const byTopic = {};
  dueCards.forEach(c => { const topicId = c.topicId || c.id.split('_')[0]; if (!byTopic[topicId]) byTopic[topicId] = []; byTopic[topicId].push(c); });
  return `<h1>Review</h1><p style="color:var(--text2);margin-bottom:16px;">${dueCards.length} cards due</p>
    <button class="btn btn-block" onclick="startReviewSession()">Start Review Session</button>
    <h2>Due by Topic</h2><ul class="topic-list">${Object.entries(byTopic).map(([topicId, cards]) => {
      const topic = TOPICS.find(t => t.id === topicId) || ALL_SUBTOPICS.find(t => t.id === topicId);
      return `<li class="topic-item"><span>${topic ? topic.name : topicId}</span><span class="badge">${cards.length}</span></li>`;
    }).join('')}</ul>`;
}

function renderTest() {
  if (state.testResults) return renderTestResults();
  return `<h1>Test Mode</h1><p style="color:var(--text2);margin-bottom:16px;">Create a custom quiz</p>
    <div class="card"><h3>Select Topics</h3><div style="margin-bottom:12px;"><button class="btn btn-sm btn-secondary" onclick="selectAllTopics(true)">Select All</button> <button class="btn btn-sm btn-secondary" onclick="selectAllTopics(false)">Clear All</button></div>
    <div class="checkbox-grid" id="topic-checkboxes">${ALL_SUBTOPICS.map(t => `<label class="checkbox-item"><input type="checkbox" name="topic" value="${t.id}" checked><span>${t.name}</span></label>`).join('')}</div></div>
    <div class="card"><h3>Settings</h3><div style="margin-bottom:12px;"><label style="color:var(--text2);">Number of Questions</label>
    <select id="num-questions"><option value="5">5 questions</option><option value="10" selected>10 questions</option><option value="15">15 questions</option><option value="20">20 questions</option></select></div>
    <div><label style="color:var(--text2);">Difficulty</label><div class="diff-pills"><span class="diff-pill active" data-diff="1" onclick="setTestDiff(1)">Easy</span><span class="diff-pill" data-diff="2" onclick="setTestDiff(2)">Medium</span><span class="diff-pill" data-diff="3" onclick="setTestDiff(3)">Hard</span><span class="diff-pill" data-diff="0" onclick="setTestDiff(0)">Mixed</span></div></div></div>
    <button class="btn btn-block" onclick="startTest()">Start Test</button>`;
}

function renderTestRun() {
  const q = state.testQuestions[state.testCurrentIndex];
  const progress = `${state.testCurrentIndex + 1} / ${state.testQuestions.length}`;
  const topic = ALL_SUBTOPICS.find(t => t.id === q.topicId) || TOPICS.find(t => t.id === q.topicId);
  return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;"><h1 style="margin:0;">Test</h1><span style="color:var(--text2);">${progress}</span></div>
    <div class="progress-bar" style="margin-bottom:16px;"><div class="progress-fill" style="width:${Math.round(100*state.testCurrentIndex/state.testQuestions.length)}%;background:var(--accent);"></div></div>
    <div class="card"><p style="color:var(--text2);font-size:0.9rem;margin-bottom:8px;">${topic ? topic.name : q.topicId}</p><p style="font-size:1.1rem;margin-bottom:16px;"><strong>${q.prompt}</strong></p>
    <form onsubmit="submitTestAnswer(event)"><input type="text" id="test-answer" placeholder="Your answer..." autocomplete="off" style="margin-bottom:12px;">
    <button type="submit" class="btn btn-block">${state.testCurrentIndex === state.testQuestions.length - 1 ? 'Finish Test' : 'Next Question'}</button></form></div>
    <button class="btn btn-secondary btn-block" onclick="if(confirm('Abandon test?')) showPage('test')">Cancel Test</button>`;
}

function renderTestResults() {
  const results = state.testResults;
  const score = results.correct / results.total * 100;
  const mistakesByTopic = {};
  results.questions.forEach((q, i) => { if (!results.answers[i].correct) { const topicId = q.topicId; if (!mistakesByTopic[topicId]) mistakesByTopic[topicId] = []; mistakesByTopic[topicId].push({ q, userAnswer: results.answers[i].given }); } });
  return `<h1>Test Results</h1>
    <div class="card" style="text-align:center;padding:24px;"><p style="font-size:3rem;margin:0;">${score >= 80 ? '&#127881;' : score >= 60 ? '&#128077;' : '&#128218;'}</p>
    <p style="font-size:2rem;font-weight:bold;color:${score>=80?'var(--success)':score>=60?'var(--warning)':'var(--accent)'};">${score.toFixed(0)}%</p>
    <p style="color:var(--text2);">${results.correct} / ${results.total} correct</p></div>
    ${Object.keys(mistakesByTopic).length > 0 ? `<h2>Topics to Review</h2>${Object.entries(mistakesByTopic).map(([topicId, mistakes]) => {
      const topic = ALL_SUBTOPICS.find(t => t.id === topicId) || TOPICS.find(t => t.id === topicId);
      return `<div class="card"><h3 style="margin-top:0;">${topic ? topic.name : topicId}</h3>
        ${mistakes.map(({ q, userAnswer }) => `<div style="padding:8px;background:var(--bg2);border-radius:8px;margin:8px 0;"><p style="margin:0;"><strong>Q:</strong> ${q.prompt}</p><p style="margin:4px 0;color:var(--accent);">Your answer: ${userAnswer || '(none)'}</p><p style="margin:0;color:var(--success);">Correct: ${q.answer}</p></div>`).join('')}
        <button class="btn btn-sm" style="margin-top:8px;" onclick="startPractice('${topicId}')">Practice ${topic ? topic.name : topicId}</button></div>`;
    }).join('')}` : ''}
    <div class="flex-row"><button class="btn flex-grow" onclick="state.testResults=null;showPage('test')">New Test</button><button class="btn btn-secondary" onclick="showPage('topics')">Topics</button></div>`;
}

function renderStats() {
  const attempts = loadAttempts();
  const progress = loadProgress();
  const totalCorrect = Object.values(progress).reduce((sum, p) => sum + (p.correct || 0), 0);
  const totalAttempts = Object.values(progress).reduce((sum, p) => sum + (p.total || 0), 0);
  const accuracy = totalAttempts > 0 ? Math.round(100 * totalCorrect / totalAttempts) : 0;
  const mastered = ALL_SUBTOPICS.filter(t => getTopicMastery(t.id).isMastered).length;
  const now = Date.now(), day = 24*60*60*1000;
  const last24h = attempts.filter(a => now - a.timestamp < day).length;
  const last7d = attempts.filter(a => now - a.timestamp < 7*day).length;
  return `<h1>Statistics</h1>
    <div class="card"><h3 style="margin-top:0;">Overall</h3>
    <div class="stat-card"><span>Total Questions</span><span class="stat-value">${totalAttempts}</span></div>
    <div class="stat-card"><span>Correct Answers</span><span class="stat-value">${totalCorrect}</span></div>
    <div class="stat-card"><span>Accuracy</span><span class="stat-value" style="color:${accuracy>=80?'var(--success)':accuracy>=60?'var(--warning)':'var(--accent)'};">${accuracy}%</span></div>
    <div class="stat-card"><span>Topics Mastered</span><span class="stat-value">${mastered}/${ALL_SUBTOPICS.length}</span></div></div>
    <div class="card"><h3 style="margin-top:0;">Recent Activity</h3>
    <div class="stat-card"><span>Last 24 hours</span><span>${last24h} questions</span></div>
    <div class="stat-card"><span>Last 7 days</span><span>${last7d} questions</span></div></div>
    <button class="btn btn-secondary btn-block" style="margin-top:16px;" onclick="if(confirm('Reset all progress? This cannot be undone.')) { localStorage.clear(); render(); }">Reset All Progress</button>`;
}

function showPage(page) { state.page = page; state.showResult = false; state.showExplanation = false; if (page === 'test') state.testResults = null; render(); }
function showLearn(topicId) { state.page = 'learn'; state.currentTopic = topicId; render(); }
function startPractice(topicId) { state.page = 'practice'; state.currentTopic = topicId; state.currentQuestion = generateQuestion(topicId, state.difficulty); state.showResult = false; state.showExplanation = false; render(); setTimeout(() => document.getElementById('answer')?.focus(), 100); }
function setDifficulty(d) { state.difficulty = d; state.currentQuestion = generateQuestion(state.currentTopic, d); state.showExplanation = false; render(); }
function nextQuestion() { state.currentQuestion = generateQuestion(state.currentTopic, state.difficulty); state.showResult = false; state.showExplanation = false; render(); setTimeout(() => document.getElementById('answer')?.focus(), 100); }
function showHint(n) { const el = document.getElementById('hint' + n); if (el) { el.classList.toggle('show'); if (typeof renderMathInElement !== 'undefined') renderMathInElement(el, {delimiters:[{left:'\\(',right:'\\)',display:false}],throwOnError:false}); } }
function toggleExplanation() { state.showExplanation = !state.showExplanation; const el = document.getElementById('explanation'); if (el) { el.classList.toggle('hidden', !state.showExplanation); if (typeof renderMathInElement !== 'undefined') renderMathInElement(el, {delimiters:[{left:'\\(',right:'\\)',display:false}],throwOnError:false}); } }
function toggleTopic(topicId) { state.expandedTopics[topicId] = !state.expandedTopics[topicId]; saveExpandedState(state.expandedTopics); render(); }
function submitAnswer(e) { e.preventDefault(); const input = document.getElementById('answer'); const userAnswer = input.value.trim(); const q = state.currentQuestion; const isCorrect = checkAnswer(userAnswer, q.answer); recordAttempt(state.currentTopic, isCorrect, q.mistakeTypes?.[0], userAnswer); updateSRS(`${q.topicId}_${q.seed}_${q.difficulty}`, q.topicId, isCorrect); state.lastAnswer = userAnswer; state.wasCorrect = isCorrect; state.showResult = true; render(); }
function startReviewSession() { const due = getDueCards(); if (due.length === 0) return; const card = due[0]; const topicId = card.topicId || card.id.split('_')[0]; startPractice(topicId); }
let testDifficulty = 1;
function setTestDiff(d) { testDifficulty = d; document.querySelectorAll('.diff-pill[data-diff]').forEach(el => el.classList.toggle('active', parseInt(el.getAttribute('data-diff')) === d)); }
function selectAllTopics(select) { document.querySelectorAll('#topic-checkboxes input').forEach(cb => cb.checked = select); }
function startTest() { const selected = Array.from(document.querySelectorAll('#topic-checkboxes input:checked')).map(cb => cb.value); if (selected.length === 0) { alert('Please select at least one topic.'); return; } const numQ = parseInt(document.getElementById('num-questions').value); const questions = []; for (let i = 0; i < numQ; i++) { const topicId = selected[i % selected.length]; const diff = testDifficulty === 0 ? randInt(rng(Date.now() + i), 1, 3) : testDifficulty; const q = generateQuestion(topicId, diff); if (q) questions.push(q); } for (let i = questions.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [questions[i], questions[j]] = [questions[j], questions[i]]; } state.testQuestions = questions; state.testAnswers = []; state.testCurrentIndex = 0; state.page = 'testRun'; render(); setTimeout(() => document.getElementById('test-answer')?.focus(), 100); }
function submitTestAnswer(e) { e.preventDefault(); const input = document.getElementById('test-answer'); const userAnswer = input.value.trim(); const q = state.testQuestions[state.testCurrentIndex]; const isCorrect = checkAnswer(userAnswer, q.answer); state.testAnswers.push({ given: userAnswer, correct: isCorrect }); recordAttempt(q.topicId, isCorrect, q.mistakeTypes?.[0], userAnswer); if (state.testCurrentIndex < state.testQuestions.length - 1) { state.testCurrentIndex++; render(); setTimeout(() => document.getElementById('test-answer')?.focus(), 100); } else { state.testResults = { questions: state.testQuestions, answers: state.testAnswers, correct: state.testAnswers.filter(a => a.correct).length, total: state.testQuestions.length }; state.page = 'testResults'; render(); } }
if ('serviceWorker' in navigator) window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration failed:', err)));
render();
</script>
</body>
</html>
